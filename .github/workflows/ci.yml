name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Dummy values — the build only needs these to exist, never to work.
      # NEXT_PUBLIC_* are inlined at build time; server keys are read lazily at runtime.
      ANTHROPIC_API_KEY: ci-dummy
      NEXT_PUBLIC_SUPABASE_URL: https://ci-dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
